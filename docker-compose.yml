services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-learning-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - VECTOR_DB_PATH=/app/vector_db
      - CHROMA_DB_PATH=/app/vector_db
      - OPENAI_MODEL=gpt-3.5-turbo
    volumes:
      - backend_data:/app/vector_db
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-learning-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-learning-network

networks:
  ai-learning-network:
    driver: bridge

volumes:
  backend_data:
